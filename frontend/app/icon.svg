<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="viridis" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#440154"/>
      <stop offset="25%" stop-color="#3b528b"/>
      <stop offset="50%" stop-color="#21918c"/>
      <stop offset="75%" stop-color="#5ec962"/>
      <stop offset="100%" stop-color="#fde725"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0a0a0f"/>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer contour (high loss) -->
    <ellipse cx="16" cy="17" rx="12" ry="9" stroke="#440154" stroke-width="1.5"/>
    <!-- Second contour -->
    <ellipse cx="16" cy="16.5" rx="9.5" ry="7" stroke="#3b528b" stroke-width="1.5"/>
    <!-- Third contour -->
    <ellipse cx="16" cy="16" rx="7" ry="5" stroke="#21918c" stroke-width="1.5"/>
    <!-- Fourth contour -->
    <ellipse cx="16" cy="15.5" rx="4.5" ry="3.2" stroke="#5ec962" stroke-width="1.5"/>
    <!-- Minimum point (low loss) -->
    <circle cx="16" cy="15" r="1.8" fill="#fde725"/>
  </g>
</svg>
